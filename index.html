<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challey Cafe</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-wrapper">
  <div class="main-bg"></div>
</div>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top bg-dark bg-opacity-50">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">CHALLEY CAFE</a>
  </div>
</nav>

<div class="container" style="margin-top: 100px; min-height: 75vh;">
  <div class="row justify-content-center">
    <div class="col-lg-8 text-center">
      
      <div class="position-relative d-inline-block w-100">
        <div id="cafeCarousel" class="carousel slide" data-bs-ride="carousel">
          <div class="carousel-inner">
            <div class="carousel-item active">
              <img src="puti.avif" class="d-block w-100" alt="Puti">
              <h5 class="text-white mt-3 fw-bold">₱120.00</h5>
            </div>
            <div class="carousel-item">
              <img src="chocowhite.avif" class="d-block w-100" alt="Choco White">
              <h5 class="text-white mt-3 fw-bold">₱135.00</h5>
            </div>
            <div class="carousel-item">
              <img src="choco.avif" class="d-block w-100" alt="Choco">
              <h5 class="text-white mt-3 fw-bold">₱130.00</h5>
            </div>
          </div>
          <button class="carousel-control-prev" type="button" data-bs-target="#cafeCarousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
          </button>
          <button class="carousel-control-next" type="button" data-bs-target="#cafeCarousel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
          </button>
        </div>
      </div>

      <button class="btn btn-order-trigger shadow-lg" data-bs-toggle="modal" data-bs-target="#orderModal">
        ORDER NOW
      </button>

    </div>
  </div>
</div>

<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title fw-bold">Order Form</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form class="needs-validation" novalidate>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Name" required>
          </div>
          <div class="mb-3">
            <input type="email" class="form-control" placeholder="Email" required>
          </div>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Address" required>
          </div>
          <div class="mb-3">
            <input type="text" class="form-control" placeholder="Landmark" required>
          </div>
          <button type="submit" class="btn btn-light w-100 fw-bold py-2">Submit Order</button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <h6>Challey Cafe shop</h6>
    <span>@2026challeycafe | 0935123123</span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    'use strict'
    const forms = document.querySelectorAll('.needs-validation')
    Array.from(forms).forEach(form => {
      form.addEventListener('submit', event => {
        if (!form.checkValidity()) {
          event.preventDefault()
          event.stopPropagation()
        }
        form.classList.add('was-validated')
      }, false)
    })
  })()
</script>

</body>
</html>
